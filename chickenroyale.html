<!-- 3) PART CONFIG + initUnity OVERRIDE
     unityapp.js'den SONRA yüklenir → onun tanımını ezer.
     DOMContentLoaded henüz tetiklenmedi, bu yüzden override geçerli olur. -->
<script>
const BUILD_URL  = "https://cdn.jsdelivr.net/gh/docs-g-classroommyflies/zalman@main/Build";
const DATA_FILE  = "6de906397cd579daa7f7e8fa16294d67.data";
const WASM_FILE  = "a5d4f54385c367ba46a38df80e9e248a.wasm";
const DATA_PARTS = 5;
const WASM_PARTS = 4;

/* Part loader promise — parçalar hazır olunca resolve edilir */
let _resolveBlobs;
const _blobsReady = new Promise(res => { _resolveBlobs = res; });

/* unityapp'in kendi initUnity'sini EZİYORUZ */
window.initUnity = async function () {
    const { dataUrl, wasmUrl } = await _blobsReady;   /* parçaları bekle */

    const cfg        = window.unityapp.initUnityConfig;
    const buildUrl   = cfg.buildUrl || BUILD_URL;
    const canvas     = document.querySelector("#unity-canvas");
    const progressEl = document.querySelector("#unity-progress-bar-fill");
    const warningEl  = document.querySelector("#unity-warning");

    /* Blob URL'leri DOĞRUDAN veriyoruz — buildUrl+ concat YOK */
    const unityConfig = {
        dataUrl:                dataUrl,
        frameworkUrl: /^https?:\/\//.test(cfg.filenameFramework) ? cfg.filenameFramework : `${buildUrl}/${cfg.filenameFramework}`,
        codeUrl:                wasmUrl,
        streamingAssetsUrl:     "StreamingAssets",
        companyName:            cfg.companyName,
        productName:            cfg.productName,
        productVersion:         cfg.productVersion,
        matchWebGLToCanvasSize: true,
        devicePixelRatio:       1,
        showBanner: function (msg, type) {
            if (!warningEl) return;
            const d = document.createElement("div");
            d.innerHTML = msg;
            if (type === "error")        d.style = "background:red;padding:10px;";
            else if (type === "warning") d.style = "background:yellow;padding:10px;";
            warningEl.appendChild(d);
            setTimeout(() => { warningEl.removeChild(d); }, 5000);
            warningEl.style.display = warningEl.children.length ? "block" : "none";
        }
    };

    const loaderScript  = document.createElement("script");
    const loaderSrc = /^https?:\/\//.test(cfg.filenameLoader) ? cfg.filenameLoader : `${buildUrl}/${cfg.filenameLoader}`;
    loaderScript.src    = loaderSrc;
    loaderScript.onload = function () {
        window.unityapp.createUnityInstance(
            canvas, unityConfig,
            (p) => {                                    /* progress */
                if (progressEl) progressEl.style.width =
                    `calc(2.6rem + (100% - 2.6rem) * ${Math.min(p,1).toFixed(2)})`;
            },
            (instance) => {                             /* success */
                window.unityInstance = instance;
                const content = document.getElementById("unity-content");
                if (content) {
                    content.classList.toggle("fade-out");
                    setTimeout(() => { content.style.display = "none"; }, 500);
                }
            },
            () => { setTimeout(() => { window.unsupportedDevice?.(); }, 5000); },  /* error */
            () => {                                     /* pause/resume */
                const content = document.getElementById("unity-content");
                if (content) { content.style.display=""; content.classList.toggle("fade-out"); }
            }
        );
    };
    document.body.appendChild(loaderScript);
};
</script>

<!-- 5) PART LOADER — parçaları indir, birleştir, Blob URL üret -->
<script>
(async () => {
    const bar    = document.querySelector("#unity-progress-bar-fill");
    const setBar = (pct) => {
        if (bar) bar.style.width =
            `calc(2.6rem + (100% - 2.6rem) * ${(pct / 100).toFixed(2)})`;
    };

    async function fetchParts(filename, count, startPct, endPct) {
        const step   = (endPct - startPct) / count;
        const chunks = [];
        for (let i = 0; i < count; i++) {
            const resp = await fetch(`${BUILD_URL}/${filename}.part${i}`);
            if (!resp.ok) throw new Error(`HTTP ${resp.status} → ${BUILD_URL}/${filename}.part${i}`);
            chunks.push(new Uint8Array(await resp.arrayBuffer()));
            setBar(Math.round(startPct + step * (i + 1)));
        }
        const total  = chunks.reduce((s, c) => s + c.length, 0);
        const merged = new Uint8Array(total);
        let offset = 0;
        for (const c of chunks) { merged.set(c, offset); offset += c.length; }
        return URL.createObjectURL(new Blob([merged]));
    }

    try {
        setBar(2);
        const [dataUrl, wasmUrl] = await Promise.all([
            fetchParts(DATA_FILE, DATA_PARTS, 2,  55),
            fetchParts(WASM_FILE, WASM_PARTS, 55, 90),
        ]);
        setBar(92);
        _resolveBlobs({ dataUrl, wasmUrl });   /* initUnity'nin beklemesini bitir */
    } catch (err) {
        console.error("Yükleme hatası:", err);
        const w = document.getElementById("unity-warning");
        if (w) { w.textContent = "Yükleme hatası: " + err.message; w.style.display = "block"; }
    }
})();
</script>

<style>
  /* Container: Bottom center, fixed, with overflow hidden */
  #ad-container {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: min(728px, calc(100% - 20px)); /* 728px, 10px margin on mobile */

    display: none;

    border-radius: 0; /* Sharp corners */
    overflow: hidden;
    box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.45);
    box-sizing: border-box;
    transition: transform 0.5s ease-in-out; /* Smooth slide-in/out animation */
  }

  /* Slide-out animation */
  #ad-container.hidden {
    transform: translate(-50%, 100%); /* Slide down out of view */
  }

  #ad-iframe {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 745px; /* Updated width */
    height: 90px; /* Updated height */
    border: 0;
    display: block;
    overflow: hidden;
    pointer-events: auto;
    box-sizing: content-box;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  
  #ad-iframe::-webkit-scrollbar {
    display: none;
    width: 0;
    height: 0;
  }

  /* Close button with arrow */
  #close-ad {
    position: absolute;
    top: 6px;
    right: 8px;
    background: #ff4d4d;
    color: #fff;
    border: none;
    padding: 5px 9px;
    font-size: 13px;
    border-radius: 4px;
    cursor: not-allowed;
    opacity: 0.72;
    z-index: 100000;
    display: flex;
    align-items: center;
  }
  #close-ad.enabled {
    cursor: pointer;
    opacity: 1;
  }
  #close-ad::before {
    content: '↓'; /* Down arrow for bottom ad */
    margin-right: 4px;
  }

  /* Right mask for scrollbar */
  #ad-right-mask {
    position: absolute;
    top: 0;
    right: 0;
    width: 12px;
    height: 100%;
    pointer-events: none;
    background: linear-gradient(to right, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.9));
    z-index: 99999;
  }

  /* Mobile adjustments */
  @media (max-width: 440px) {

<div id="ad-container" aria-hidden="false" role="dialog" aria-label="Advertisement" style="display: block;">
  <iframe id="ad-iframe" src="https://script.google.com/macros/s/AKfycbxLG5DHBe-sIbduDvwQZYJ3oaX_ha7rsvroprCFkQsnpZK_PEdipNia5ghxI_sdXYpv/exec" width="768px" height="95px" scrolling="no" frameborder="0" sandbox="allow-scripts allow-popups allow-same-origin"></iframe>
  <button id="close-ad" class="enabled">Close ↓</button>
  <div id="ad-right-mask"></div>
</div>

<script>
  (function () {
    const showDelay = 2000; // 2 seconds delay before first show
    const countdownStart = 12; // 12 seconds countdown
    const reappearDelay = 150000; // 25 seconds before reappearance
    const adContainer = document.getElementById('ad-container');
    const closeBtn = document.getElementById('close-ad');

    function showAd() {
      // Show ad with smooth slide-in
      adContainer.style.display = 'block';
      adContainer.classList.remove('hidden');
      adContainer.setAttribute('aria-hidden', 'false');

      // Start countdown
      let timeLeft = countdownStart;
      closeBtn.textContent = `Close (${timeLeft})`;
      closeBtn.disabled = true;
      closeBtn.classList.remove('enabled');

      const t = setInterval(() => {
        timeLeft--;
        if (timeLeft > 0) {
          closeBtn.textContent = `Close (${timeLeft})`;
        } else {
          clearInterval(t);
          closeBtn.disabled = false;
          closeBtn.classList.add('enabled');
          closeBtn.textContent = 'Close ↓';
        }
      }, 1000);
    }

    // Initial ad show
    setTimeout(showAd, showDelay);

    // Close with animation and schedule reappearance
    closeBtn.addEventListener('click', () => {
      if (closeBtn.disabled) return;
      adContainer.classList.add('hidden');
      adContainer.setAttribute('aria-hidden', 'true');
      // Schedule reappearance without removing or reloading iframe
      setTimeout(showAd, reappearDelay);
    });
  })();
</script>
